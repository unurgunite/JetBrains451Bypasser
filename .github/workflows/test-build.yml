name: Test Build on PR

on:
  pull_request:
    branches:
      - master
      - develop
      - 'feature/**'

jobs:
  test-build:
    name: Test build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest ]

    steps:
      - uses: actions/checkout@v4

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install GTK3 (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev

      - name: Install shards
        working-directory: ./jb_updater
        run: shards install

      - name: Run Ameba linter
        working-directory: ./jb_updater
        run: ./bin/ameba || ./lib/ameba/bin/ameba || crystal run lib/ameba/src/cli.cr -- .

      - name: Build CLI
        working-directory: ./jb_updater
        run: crystal build src/main.cr --release -o jb_updater

      - name: Build GUI
        working-directory: ./jb_updater
        run: crystal build src/gui/main_gui.cr --release -o jb_updater_gui

      - name: Run CLI --help
        working-directory: ./jb_updater
        run: ./jb_updater --help
